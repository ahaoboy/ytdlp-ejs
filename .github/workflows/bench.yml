name: Bench

permissions:
  contents: write

on:
  push:
  pull_request:

defaults:
  run:
    shell: bash --noprofile --norc -CeEuo pipefail {0}

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
          - name: windows
            os: windows-latest
          - name: ubuntu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: install yt-dlp
        run: pip install -q yt-dlp

      - name: run
        run: |
          cargo run -q --example download_players
          cargo run -q --example generate_csv > cases.csv
          # cargo build --release -q
          cargo install -q --path=. --force

          ls -lh

      - name: bench
        run: |
          bun ./bench.ts
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.4
        if: ${{ matrix.os == 'ubuntu-latest' }}
        with:
          stack: dual # Optional. Support [ ipv4, ipv6, dual ]. Default is dual.
          mode: client # Optional. Support [ wireguard, client ]. Default is wireguard.

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: install yt-dlp
        run: pip install -q yt-dlp

      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary
      - uses: denoland/setup-deno@v2
        with:
          deno-version: canary

      - name: run
        run: |
          cargo run -q --example download_players
          cargo run -q --example generate_csv > cases.csv
          cargo install -q --path=. --force

          ls -lh
          curl -fsSL https://raw.githubusercontent.com/easy-install/easy-install/main/install.sh | sh
          ei https://github.com/ahaoboy/quickjs-build
      - name: time (yt-dlp integration)
        run: |
          EJS_BIN="$HOME/.cargo/bin/ejs"
          [[ "$RUNNER_OS" == "Windows" ]] && EJS_BIN="${EJS_BIN}.exe"
          YTDLP_ARGS="-v --extractor-args youtube:jsc_trace=true -F https://www.youtube.com/watch?v=BnnbP7pCIvQ https://www.youtube.com/watch?v=E2Rj2gQAyPA"

          echo "=== ejs (Rust, native pipeline) ==="
          time yt-dlp $YTDLP_ARGS --js-runtimes "quickjs:${EJS_BIN}"

          echo ""
          echo "=== quickjs (JS interpreter) ==="
          time yt-dlp $YTDLP_ARGS --js-runtimes quickjs

          echo ""
          echo "=== deno ==="
          time yt-dlp $YTDLP_ARGS --js-runtimes deno

          echo ""
          echo "=== bun ==="
          time yt-dlp $YTDLP_ARGS --js-runtimes bun

          echo ""
          echo "=== node ==="
          time yt-dlp $YTDLP_ARGS --js-runtimes node
