name: Bench

permissions:
  contents: write

on:
  push:
  pull_request:

defaults:
  run:
    shell: bash --noprofile --norc -CeEuo pipefail {0}

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
          - name: windows
            os: windows-latest
          - name: ubuntu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: run
        run: |
          cargo run -q --example download_players
          cargo run -q --example generate_csv > cases.csv
          # cargo build --release -q
          cargo install -q --path=. --force

          ls -lh

      - name: bench
        run: |
          bun ./bench.ts

      - name: time (yt-dlp integration)
        run: |
          EJS_BIN="$HOME/.cargo/bin/ejs"
          # On Windows runners cargo install adds .exe
          [[ "$RUNNER_OS" == "Windows" ]] && EJS_BIN="${EJS_BIN}.exe"
          YTDLP_ARGS="-v --extractor-args youtube:jsc_trace=true -F https://www.youtube.com/watch?v=BnnbP7pCIvQ https://www.youtube.com/watch?v=E2Rj2gQAyPA"

          echo "=== ejs (Rust, native pipeline) ==="
          { time yt-dlp $YTDLP_ARGS --js-runtimes "quickjs:${EJS_BIN}"; } 2>&1 | tail -10

          echo ""
          echo "=== quickjs (JS interpreter) ==="
          { time yt-dlp $YTDLP_ARGS --js-runtimes quickjs; } 2>&1 | tail -10

          echo ""
          echo "=== deno ==="
          { time yt-dlp $YTDLP_ARGS --js-runtimes deno; } 2>&1 | tail -10

          echo ""
          echo "=== bun ==="
          { time yt-dlp $YTDLP_ARGS --js-runtimes bun; } 2>&1 | tail -10

          echo ""
          echo "=== node ==="
          { time yt-dlp $YTDLP_ARGS --js-runtimes node; } 2>&1 | tail -10
